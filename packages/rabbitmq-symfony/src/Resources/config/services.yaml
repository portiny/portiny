# Legacy parameter defaults kept for backward compatibility. Applications that set
# "portiny.rabbitmq.connection" / "portiny.rabbitmq.aliases" (without semantic configuration under
# "portiny_rabbitmq") keep working: the extension promotes these into the "default" connection.
#
# The BunnyManager (one per named connection), ConnectionRegistry, Producer, ConsumeCommand and
# DeclareCommand services are registered dynamically by PortinyRabbitMQSymfonyExtension.
parameters:
    portiny.rabbitmq.aliases: []
    portiny.rabbitmq.connection:
        host: 127.0.0.1
        port: 5672
        user: guest
        password: guest
        vhost: /
        timeout: 1
        heartbeat: 60.0
        persistent: false
        path: /
        tcp_nodelay: false
        tcp_keepalive: false
        tcp_keepalive_idle: 60
        tcp_keepalive_interval: 30
        tcp_keepalive_count: 4
